# Slack app manifest for the lead-notification webhook.
# Recreate the app from this at: https://api.slack.com/apps → Create New App →
# "From an app manifest" → pick the Dogsled Labs workspace → paste (YAML).
#
# After creating: Features → Incoming Webhooks → Add New Webhook to Workspace →
# choose #trailhead → Allow → copy the https://hooks.slack.com/services/... URL.
# The channel binding happens at install time, so it isn't in this manifest.
display_information:
  name: Website Leads
  description: Posts inbound demo requests from the Dogsled site to #trailhead
  background_color: "#070b16"
features:
  bot_user:
    display_name: Website Leads
    always_online: false
oauth_config:
  scopes:
    bot:
      - incoming-webhook
settings:
  incoming_webhooks:
    incoming_webhooks_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
