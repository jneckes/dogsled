<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9eff9"/>
      <stop offset="1" stop-color="#c6d6f1"/>
    </linearGradient>
  </defs>
  <!-- ears: tall, sharp, back ear flush with the back edge -->
  <polygon points="10,20 19,1 30,13" fill="url(#fur)"/>
  <polygon points="32,13 41,2 51,15" fill="url(#fur)"/>
  <!-- skull + snout: steep forehead, level snout, nose step, mouth-slit underside -->
