  <!-- jaw band -->
  <polygon points="10,48 68,44.5 82,46 68,51 10,55" fill="url(#fur)"/>
  <!-- chest band -->
  <polygon points="10,58 62,54 50,61 10,65" fill="url(#fur)"/>
  <!-- eye: negative-space diamond -->
  <polygon points="56,21 60.5,24.5 56,28 51.5,24.5" fill="#0b1424"/>
  <!-- data chevrons -->
  <polygon points="10,68 44,76 78,68 78,74 44,82 10,74" fill="#dfe8f6"/>
  <polygon points="10,76.5 44,84.5 78,76.5 78,82.5 44,90.5 10,82.5" fill="#8fb0f2"/>
  <polygon points="10,85 44,93 78,85 78,91 44,99 10,91" fill="#38bdf8"/>
</svg>
